<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh;">
    <div class="contact-card" style="width: 400px;">
        <h2>Регистрация</h2>
        <form action="/register" method="POST">
            <input type="text" name="username" placeholder="Логин" required style="margin-bottom:15px;">
            <input type="email" name="email" placeholder="Email" required style="margin-bottom:15px;">
            <input type="password" name="password" placeholder="Пароль" required style="margin-bottom:20px;">
            <button type="submit" class="btn-primary w-100">Создать аккаунт</button>
        </form>
        <p style="margin-top:15px; font-size:14px;"><a href="/" style="color:gray;">На главную</a></p>
    </div>
</body>
</html>
